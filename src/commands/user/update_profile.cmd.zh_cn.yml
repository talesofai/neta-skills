name: update_profile
title: 更新我的个人资料
description: |
  更新当前用户的个人资料。至少需要提供一个字段。

  可更新字段：nick_name（昵称）、bio（个人简介）、avatar_url（头像图片 URL）。
  成功后返回更新后的个人资料。

  注意：avatar_url 必须是已上传图片的有效 URL。如需更换头像图片，
  请先通过 OSS 上传流程上传图片，再调用此命令。

parameters:
  nick_name: 新昵称（可选）
  bio: 新个人简介（可选）
  avatar_url: 新头像图片 URL —— 必须是已上传的有效图片 URL（可选）
