name: list_my_stories
title: List My Stories
description: |
  List stories (social posts / collections) created by the current user.

  When authenticated as the story owner, this returns both PUBLISHED and PRIVATE stories.
  Results include pinned stories first, then by recency.

  Returns: has_more (true = more pages exist, increment page_index and fetch again; false = done),
  and list of story records. If has_more is true but next page returns an empty list, stop.

  Each story in the list includes: storyId (use with read_collection or publish_collection),
  name, coverUrl (thumbnail), status (PUBLISHED / PRIVATE), ctime, likeCount, is_pinned.

  Related commands:
    - publish_collection (creative): create or update a story
    - read_collection (community): read a story's full content

parameters:
  uuid: Target user UUID — defaults to the currently logged-in user (optional)
  page_index: Page index for pagination, defaults to 0 (optional)
  page_size: Results per page, 1–100, defaults to 20 (optional)
