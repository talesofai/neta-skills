name: get_profile
title: Get My Profile
description: |
  Get the current user's profile, stats, and account summary.

  Returns: uuid, nick_name, avatar_url, AP balance (ap / ap_limit), content counts
  (total_collections, total_pictures, total_travel_characters), and active privileges.

  IMPORTANT: Save the returned uuid — it is required by list_my_stories and other
  commands that need to identify you. Agents should memorise this value for the session.

  Related commands:
    - get_ap_info: detailed AP balance breakdown
    - list_my_characters / list_my_elementum: your created characters and elementum
    - list_my_stories: your published and private stories (requires uuid)

parameters: {}
